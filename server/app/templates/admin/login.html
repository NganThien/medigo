{% extends "admin/base.html" %}

{% block title %}Đăng nhập - MediGo Admin{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-pills fa-3x mb-3" style="color: #0d6efd;"></i>
                    <h3 class="fw-bold">MediGo Admin</h3>
                    <p class="text-muted">Đăng nhập hệ thống quản trị</p>
                </div>
                
                <form method="POST" action="">
                    <div class="mb-3">
                        <label for="phone" class="form-label fw-semibold">Số điện thoại</label>
                        <input type="text" class="form-control" id="phone" name="phone" required placeholder="Nhập số điện thoại">
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Nhập mật khẩu">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Đăng nhập</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
